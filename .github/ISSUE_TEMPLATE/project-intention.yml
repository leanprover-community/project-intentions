name: Project intention
description: Register a project you're working on, so others can find you and avoid duplicating it.
title: "[Intention] "
labels: [intention]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for registering a project. A few things to keep in mind before you start:

        - **This is purely informational.** Nobody is obliged to respect, check, or even read your
          registration. It is not a queue, a lock, or a priority right. It buys you no claim over
          anything; it just makes your intentions visible.
        - **Be specific, and be credible.** A vague registration with an optimistic expiry helps
          nobody and discourages others. Say exactly what you're doing, and give an expiry you
          actually believe.
        - **This repository is public.** For private work, describe it only at the level you're happy
          to make public, and leave out anything confidential.
  - type: textarea
    id: description
    attributes:
      label: What are you working on?
      description: >
        Be specific. Name the theorem, definition, or area, and where it sits. "Formalising the
        Radon-Nikodym theorem, extending Mathlib.MeasureTheory.Decomposition.Lebesgue" is useful;
        "working on analysis" is not.
      placeholder: Describe the project as concretely as you can.
    validations:
      required: true
  - type: dropdown
    id: topics
    attributes:
      label: Relevant Mathlib topic areas
      description: >
        Select any Mathlib topic areas this work touches. These mirror the `t-` labels used in the
        Mathlib repository, and they let people filter the board by area. The labels you pick here are
        applied to the issue automatically. Leave blank if none fit (for example, work outside Mathlib).
      multiple: true
      options:
        - t-algebra
        - t-algebraic-geometry
        - t-algebraic-topology
        - t-analysis
        - t-category-theory
        - t-combinatorics
        - t-computability
        - t-condensed
        - t-convex-geometry
        - t-data
        - t-differential-geometry
        - t-dynamics
        - t-euclidean-geometry
        - t-functional-analysis
        - t-geometric-group-theory
        - t-group-theory
        - t-linter
        - t-logic
        - t-measure-probability
        - t-meta
        - t-number-theory
        - t-order
        - t-ring-theory
        - t-set-theory
        - t-topology
    validations:
      required: false
  - type: dropdown
    id: visibility
    attributes:
      label: Is this happening in public or in private?
      description: Public means the work (or its repository) is openly visible; private means it isn't yet.
      options:
        - Public
        - Private
    validations:
      required: true
  - type: input
    id: repository
    attributes:
      label: Repository, or where the public work is visible (required for public work)
      description: >
        If the work is public, link the repository, branch, or directory where it's happening. If it's
        public but there's no repository yet, say where people can see it. Leave blank only if the
        project is private for now.
      placeholder: https://github.com/...
    validations:
      required: false
  - type: input
    id: event
    attributes:
      label: Associated conference, workshop, meeting, sprint, or seminar (if any)
      description: >
        If this work is tied to a specific event or recurring meeting — a formalisation workshop, a
        sprint, a hackathon, a seminar — name it and roughly when it's happening.
      placeholder: e.g. Lean Together 2026, or a formalisation week in September.
    validations:
      required: false
  - type: dropdown
    id: student-research
    attributes:
      label: Is this associated with student research?
      description: >
        For example a thesis, a supervised project, or a class. This helps people understand the
        context, and be considerate of work that students are depending on.
      options:
        - "No"
        - "Yes"
    validations:
      required: true
  - type: input
    id: student-research-details
    attributes:
      label: Student research details (required if you answered yes)
      description: >
        If yes, say a little more: the kind of project (thesis, class, supervised project), the
        institution or programme if you're happy to, and the supervisor if relevant.
    validations:
      required: false
  - type: dropdown
    id: ai-use
    attributes:
      label: How much AI is involved?
      description: >
        Honour system. Pick the level that best describes this work, so people who care either way can
        find or avoid it. The levels run from no AI at all to a fully autonomous AI project.
      options:
        - No AI use
        - AIs consulted as research assistants
        - Some AI code, but human reviewed
        - Some code only reviewed by AI
        - AI written, following a human roadmap
        - Autonomous AI project
    validations:
      required: true
  - type: input
    id: expiry
    attributes:
      label: Credible expiry date
      description: >
        When do you genuinely expect to have made real progress or finished? Be honest: an expiry you
        don't believe is worse than none. Maximum six months out. Give an actual date in `YYYY-MM-DD`
        form (e.g. `2026-09-01`), not a duration like `6 months`, so anyone reading the board sees the
        deadline without working out when you claimed it.
      placeholder: e.g. 2026-09-01
    validations:
      required: true
  - type: markdown
    attributes:
      value: |
        ### That's it

        Submitting this form registers you — no extra step. The bot records your expiry from the field
        above and comments to confirm.

        Renew any time by commenting `claim <your expiry>` before it lapses, and `disclaim` to release
        it early once you're done or have moved on.
